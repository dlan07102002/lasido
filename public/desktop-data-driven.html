<!doctype html>

<html class="scroll-smooth" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>LaSiDoHouse | Boutique Stays in Hanoi</title>
        <script>
            (function () {
                var mobileQuery = window.matchMedia("(max-width: 767.98px)");

                function syncViewport(event) {
                    if (event.matches) {
                        window.location.replace("mobile-data-driven.html");
                    }
                }

                syncViewport(mobileQuery);

                if (typeof mobileQuery.addEventListener === "function") {
                    mobileQuery.addEventListener("change", syncViewport);
                } else {
                    mobileQuery.addListener(syncViewport);
                }
            })();
        </script>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#8b7355",
                            "primary-container": "#a08c6d",

                            surface: "#faf7f2",
                            "surface-bright": "#faf7f2",

                            "surface-container": "#f0e9df",
                            "surface-container-low": "#f6f1e8",

                            "on-primary": "#ffffff",

                            "on-surface": "#1f1b16",
                            "on-surface-variant": "#5c5145",
                        },
                        borderRadius: {
                            DEFAULT: "0.125rem",
                            lg: "0.25rem",
                            xl: "0.5rem",
                            full: "0.75rem",
                        },
                        fontFamily: {
                            headline: ["Noto Serif"],
                            body: ["Inter"],
                            label: ["Inter"],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 300,
                    "GRAD" 0,
                    "opsz" 24;
                vertical-align: middle;
            }
            .reveal {
                opacity: 0;
                transform: translateY(30px);
                transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            }
            .reveal.active {
                opacity: 1;
                transform: translateY(0);
            }
            .hero-gradient {
                background: linear-gradient(
                    to bottom,
                    rgba(27, 29, 14, 0.4),
                    rgba(27, 29, 14, 0.1)
                );
            }
            .section-anchor-offset {
                scroll-margin-top: 0;
            }
            .header-nav-link {
                position: relative;
                display: inline-flex;
                padding-bottom: 0.35rem;
            }
            .header-nav-link::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 2px;
                background: #8b7355;
                transform: scaleX(0);
                transform-origin: center;
                transition: transform 250ms ease;
            }
            .header-nav-link.is-active {
                color: #8b7355 !important;
            }
            .header-nav-link.is-active::after {
                transform: scaleX(1);
            }
            .social-links {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }
            .social-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                width: 100%;
                min-height: 52px;
                padding: 0.75rem 1rem;
                border-radius: 9999px;
                border: 1px solid rgba(80, 101, 42, 0.14);
                background: rgba(255, 255, 255, 0.62);
                transition:
                    transform 180ms ease,
                    box-shadow 180ms ease,
                    background-color 180ms ease;
            }
            .social-link:hover {
                transform: translateY(-1px);
                box-shadow: 0 14px 28px rgba(27, 29, 14, 0.12);
                background: rgba(255, 255, 255, 0.9);
            }
            .social-logo {
                display: grid;
                place-items: center;
                width: 2.25rem;
                height: 2.25rem;
                border-radius: 9999px;
                flex: 0 0 auto;
                box-shadow: 0 10px 20px rgba(27, 29, 14, 0.16);
            }
            .social-logo svg {
                width: 1.1rem;
                height: 1.1rem;
                display: block;
            }
            .social-logo-facebook {
                background: #1877f2;
            }
            .social-logo-instagram {
                background: linear-gradient(
                    135deg,
                    #f58529 0%,
                    #dd2a7b 48%,
                    #8134af 75%,
                    #515bd4 100%
                );
            }
            .social-link-label {
                font-size: 0.95rem;
                font-weight: 600;
                line-height: 1;
                white-space: nowrap;
            }
            @media (min-width: 640px) {
                .social-links {
                    flex-direction: row;
                    flex-wrap: wrap;
                    width: auto;
                    justify-content: flex-end;
                }
                .social-link {
                    width: auto;
                    min-width: 168px;
                }
            }
        </style>
    </head>
    <body class="bg-surface text-on-surface font-body">
        <!-- TopNavBar -->

                <button

                <a

        <!-- Hero Section -->

        <!-- About Section -->
        <section

                    <span id="about-title-leading"></span>
                    <span

                </h2>
                <p

                <div class="grid grid-cols-2 gap-8 pt-4">

            <div class="relative">
                <div

                    <img

                <div

        </section>
        <!-- Main Container for Properties -->
        <main id="properties-container">

                <span

                <h2

                <div class="mt-8 h-[1px] w-24 bg-primary/20 mx-auto"></div>

        <!-- Social Proof -->
        <section

            <div class="max-w-7xl mx-auto px-8">
                <div class="flex justify-between items-end mb-16 reveal">
                    <div>
                        <h3
                            class="font-headline text-4xl mb-2"
                            id="reviews-title"
                        ></h3>
                        <p
                            class="text-on-surface-variant"
                            id="reviews-subtitle"
                        ></p>
                    </div>
                    <a

                </div>
                <div
                    class="grid grid-cols-1 md:grid-cols-3 gap-8"

                    <!-- Dynamic reviews -->

        <section
            class="section-anchor-offset py-24 bg-gradient-to-br from-primary to-primary-container text-white"
            id="booking"

            <div class="max-w-6xl mx-auto px-8">
                <div class="grid items-start gap-12 lg:grid-cols-[1.1fr_0.9fr]">

                        <h3
                            class="mt-3 max-w-xl font-headline text-4xl italic leading-tight lg:text-5xl"

                        <p

                    <div class="space-y-4 reveal" id="booking-links"></div>

        </section>
        <!-- Footer -->

            >
                <div class="flex flex-col items-center md:items-start gap-4">
                    <a
                        class="text-xl font-serif text-lime-950 dark:text-lime-100"
                        href="#"
                    >
                        <img src="/assets/logo.svg" width="90" />
                    </a>
                    <p
                        class="font-sans text-sm uppercase tracking-widest text-lime-900 dark:text-lime-400"
                    >
                        Hoan Kiem, Hanoi
                    </p>
                </div>
                <div class="flex gap-8">
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"
                        href="#"
                        id="footer-privacy"
                    ></a>
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"
                        href="#"
                        id="footer-rules"
                    ></a>
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"

                    ></a>
                </div>
                <div
                    class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto"

                    <p

                    ></p>
                    <div class="social-links">
                        <a
                            class="social-link text-lime-950 dark:text-lime-100"
                            href="https://www.facebook.com/profile.php?id=61584634003772"

                        >
                            <span
                                class="social-logo social-logo-facebook"
                                aria-hidden="true"

                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M13.642 23V13.876H16.703L17.162 10.32H13.642V8.049C13.642 7.02 13.927 6.318 15.403 6.318H17.286V3.138C16.96 3.095 15.84 3 14.538 3C11.82 3 9.958 4.659 9.958 7.705V10.32H7V13.876H9.958V23H13.642Z"
                                        fill="white"
                                    />
                                </svg>
                            </span>
                            <span class="social-link-label">Facebook</span>
                        </a>
                        <a
                            class="social-link text-lime-950 dark:text-lime-100"
                            href="https://www.instagram.com/lasidohomestay/"
                            rel="noopener noreferrer"
                            target="_blank"
                        >
                            <span
                                class="social-logo social-logo-instagram"
                                aria-hidden="true"

                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >

            <div

                id="footer-copy"
            ></div>
        </footer>
        <!-- Lightbox -->
        <div
            class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-8 backdrop-blur-xl transition-all duration-500"
            id="lightbox"
            onclick="closeLightbox()"
        >
            <button class="absolute top-8 right-8 text-white text-4xl">
                <span class="material-symbols-outlined">close</span>
            </button>
            <img
                class="max-w-full max-h-[90vh] object-contain rounded-sm shadow-2xl"
                id="lightbox-img"
                src=""
            />
        </div>
        <script src="/content-config.js"></script>
        <script>
            const COPY = window.LASIDO_CONTENT.desktop.copy;
            const PROPERTIES = window.LASIDO_CONTENT.shared.properties;
            const REVIEWS = window.LASIDO_CONTENT.shared.reviews;

            let currentLang = "en";

            function init() {
                document.documentElement.setAttribute("lang", currentLang);
                renderNav();
                renderHero();
                renderProperties();
                renderReviews();
                renderBookingLinks();
                setupHeaderNavigation();
                updateTranslations();
                observeElements();
            }

            function toggleLang() {
                currentLang = currentLang === "en" ? "vi" : "en";
                document.documentElement.setAttribute("lang", currentLang);
                document.getElementById("lang-btn").textContent =
                    currentLang.toUpperCase();
                renderNav();
                setupHeaderNavigation();
                renderReviews();
                renderBookingLinks();
                updateTranslations();
            }

            function renderNav() {
                const nav = document.getElementById("nav-links");
                const copy = COPY[currentLang];
                nav.innerHTML = `
            <a class="header-nav-link text-[#8b7355] hover:text-primary transition-colors duration-500" data-header-link href="#about">${copy.navAbout}</a>
            <a class="header-nav-link text-[#8b7355] hover:text-primary transition-colors duration-500" data-header-link href="#ltt">${copy.navSpaces}</a>
            <a class="header-nav-link text-[#8b7355] hover:text-primary transition-colors duration-500" data-header-link href="#reviews">${copy.navReviews}</a>
        `;
            }

            function renderHero() {
                const ctaContainer = document.getElementById("hero-ctas");
                ctaContainer.innerHTML = PROPERTIES.map(
                    (p, idx) => `
            <a class="${idx === 0 ? "bg-white text-on-surface" : "bg-transparent border border-white text-white"} px-10 py-4 rounded-full text-sm font-semibold tracking-widest uppercase hover:opacity-90 transition-all backdrop-blur-sm" href="#${p.id}">
                <span class="prop-label" data-id="${p.id}"></span>
            </a>
        `,
                ).join("");
            }

            function renderProperties() {
                const container = document.getElementById(
                    "properties-container",
                );
                container.innerHTML = PROPERTIES.map(
                    (p, idx) => `
            <section class="section-anchor-offset py-24 bg-surface px-8 md:px-16 lg:px-24" id="${p.id}">
                <div class="max-w-7xl mx-auto flex flex-col ${idx % 2 !== 0 ? "lg:flex-row-reverse" : "lg:flex-row"} gap-16">
                    <!-- Gallery -->
                    <div class="lg:w-[55%] reveal">
                        <div class="grid grid-cols-4 grid-rows-2 gap-4 h-[600px]">
                            <div class="col-span-4 row-span-1 overflow-hidden rounded-md">
                                <img class="w-full h-full object-cover hover:scale-110 transition-transform duration-700 cursor-zoom-in" src="${p.images[0]}" onclick="openLightbox(this.src)"/>
                            </div>
                            ${p.images
                                .slice(1)
                                .map(
                                    (img) => `
                                <div class="col-span-1 overflow-hidden rounded-md">
                                    <img class="w-full h-full object-cover cursor-zoom-in" src="${img}" onclick="openLightbox(this.src)"/>
                                </div>
                            `,
                                )
                                .join("")}
                        </div>
                    </div>
                    <!-- Info -->
                    <div class="lg:w-[45%] sticky top-32 h-fit reveal">
                        <div class="mb-4 flex gap-2">
                            <span class="px-3 py-1 text-[10px] uppercase font-bold tracking-widest rounded-full prop-district" data-id="${p.id}" style="background-color: ${p.accent}20; color: ${p.accent}">${p.district[currentLang]}</span>
                            <span class="bg-primary/10 text-primary px-3 py-1 text-[10px] uppercase font-bold tracking-widest rounded-full flex items-center gap-1">
                                <span class="material-symbols-outlined !text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
                                <span class="prop-badge" data-id="${p.id}">${p.badge[currentLang]}</span>
                            </span>
                        </div>
                        <h2 class="font-headline text-5xl mb-1 text-on-surface leading-tight prop-title" data-id="${p.id}"></h2>
                        <p class="text-sm text-primary font-medium mb-6 prop-address" data-id="${p.id}"></p>
                        
                        <div class="flex gap-6 mb-8 text-on-surface-variant font-medium text-sm">
                            ${p.stats
                                .map(
                                    (s, statIndex) => `
                                <span class="flex items-center gap-2">
                                    <span class="material-symbols-outlined">${s.icon}</span>
                                    <span class="prop-stat-text" data-id="${p.id}" data-index="${statIndex}">${s.text[currentLang]}</span>
                                </span>
                            `,
                                )
                                .join("")}
                        </div>
                        <p class="text-on-surface-variant leading-relaxed mb-10 text-lg prop-desc" data-id="${p.id}"></p>
                        
                        <div class="grid grid-cols-3 gap-6 mb-12">
                            ${p.features
                                .map(
                                    (f, featureIndex) => `
                                <div class="flex flex-col items-center p-4 bg-surface-container rounded-lg">
                                    <span class="material-symbols-outlined mb-2" style="color: ${p.accent}">${f.icon}</span>
                                    <span class="text-[10px] uppercase tracking-tighter font-bold prop-feature-label" data-id="${p.id}" data-index="${featureIndex}">${f.label[currentLang]}</span>
                                </div>
                            `,
                                )
                                .join("")}
                        </div>
                        <a class="w-full text-white py-5 rounded-sm font-bold tracking-widest uppercase hover:shadow-xl transition-all flex justify-center items-center gap-3" href="${p.ctaHref}" style="background: linear-gradient(135deg, ${p.btnColor}, ${p.btnColor}dd)">
                            <span class="prop-cta" data-id="${p.id}"></span>
                            <span class="material-symbols-outlined">${p.ctaIcon}</span>
                        </a>
                    </div>
                </div>
            </section>
        `,
                ).join("");
            }

            function renderBookingLinks() {
                const container = document.getElementById("booking-links");
                container.innerHTML = PROPERTIES.map(
                    (p) => `
            <a class="group flex items-center justify-between rounded-2xl border border-white/15 bg-white/10 px-6 py-5 backdrop-blur-sm transition-all hover:bg-white/16" href="${p.ctaHref}">
                <div>
                    <p class="text-[11px] uppercase tracking-[0.22em] text-white/60">${p.label[currentLang]}</p>
                    <p class="mt-1 font-headline text-2xl leading-tight text-white">${p.title[currentLang]}</p>
                </div>
                <span class="material-symbols-outlined transition-transform duration-200 group-hover:translate-x-1">arrow_forward</span>
            </a>
        `,
                ).join("");
            }

            function renderReviews() {
                const container = document.getElementById("reviews-container");
                container.innerHTML = REVIEWS.map(
                    (review, index) => `
            <article class="bg-surface p-10 rounded-sm shadow-sm reveal active">
                <div class="flex text-primary mb-4">
                    ${Array.from({ length: 5 }, () => '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">star</span>').join("")}
                </div>
                <p class="italic text-on-surface-variant mb-6 leading-relaxed">${review.text[currentLang]}</p>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full ${index % 2 === 0 ? "bg-surface-container-high" : "bg-surface-container"} flex items-center justify-center text-xs font-bold text-primary">
                        ${review.name
                            .split(" ")
                            .map((part) => part[0])
                            .join("")
                            .slice(0, 2)}
                    </div>
                    <div>
                        <p class="text-sm font-bold">${review.name}</p>
                        <p class="text-[10px] text-on-surface-variant uppercase tracking-widest">
                            ${review.place[currentLang]}
                        </p>
                    </div>
                </div>
            </article>
        `,
                ).join("");
            }

            function updateTranslations() {
                const copy = COPY[currentLang];

                document.getElementById("top-cta").textContent = copy.topCta;
                document.getElementById("hero-image").alt = copy.heroImageAlt;
                document.getElementById("hero-subtitle").textContent =
                    copy.heroSubtitle;
                document.getElementById("about-title-leading").textContent =
                    copy.aboutTitleLead;
                document.getElementById("about-title-accent").textContent =
                    copy.aboutTitleAccent;
                document.getElementById("about-copy").textContent =
                    copy.aboutCopy;
                document.getElementById("about-floors-unit").textContent =
                    copy.aboutFloorsUnit;
                document.getElementById("about-floors-label").textContent =
                    copy.aboutFloorsLabel;
                document.getElementById("about-rating-label").textContent =
                    copy.aboutRatingLabel;
                document.getElementById("about-host-value").textContent =
                    copy.aboutHostValue;
                document.getElementById("about-host-label").textContent =
                    copy.aboutHostLabel;
                document.getElementById("about-image").alt = copy.aboutImageAlt;
                document.getElementById("about-highlight").textContent =
                    copy.aboutHighlightQuote;
                document.getElementById("quote-text").textContent = copy.quote;
                document.getElementById("reviews-title").textContent =
                    copy.reviewsTitle;
                document.getElementById("reviews-subtitle").textContent =
                    copy.reviewsSubtitle;
                document.getElementById("reviews-link").textContent =
                    copy.reviewsLink;
                document.getElementById("booking-kicker").textContent =
                    copy.bookingKicker;
                document.getElementById("booking-title").textContent =
                    copy.bookingTitle;
                document.getElementById("booking-copy").textContent =
                    copy.bookingCopy;
                document.getElementById("footer-privacy").textContent =
                    copy.footerPrivacy;
                document.getElementById("footer-rules").textContent =
                    copy.footerRules;
                document.getElementById("footer-contact").textContent =
                    copy.footerContact;
                document.getElementById("footer-follow").textContent =
                    copy.footerFollow;
                document.getElementById("footer-copy").textContent =
                    copy.footerCopy;

                PROPERTIES.forEach((p) => {
                    const labels = document.querySelectorAll(
                        `.prop-label[data-id="${p.id}"]`,
                    );
                    labels.forEach(
                        (el) => (el.textContent = p.label[currentLang]),
                    );

                    const titles = document.querySelectorAll(
                        `.prop-title[data-id="${p.id}"]`,
                    );
                    titles.forEach(
                        (el) => (el.textContent = p.title[currentLang]),
                    );

                    const addresses = document.querySelectorAll(
                        `.prop-address[data-id="${p.id}"]`,
                    );
                    addresses.forEach(
                        (el) => (el.textContent = p.address[currentLang]),
                    );

                    const districts = document.querySelectorAll(
                        `.prop-district[data-id="${p.id}"]`,
                    );
                    districts.forEach(
                        (el) => (el.textContent = p.district[currentLang]),
                    );

                    const badges = document.querySelectorAll(
                        `.prop-badge[data-id="${p.id}"]`,
                    );
                    badges.forEach(
                        (el) => (el.textContent = p.badge[currentLang]),
                    );

                    const descs = document.querySelectorAll(
                        `.prop-desc[data-id="${p.id}"]`,
                    );
                    descs.forEach(
                        (el) => (el.textContent = p.desc[currentLang]),
                    );

                    const ctas = document.querySelectorAll(
                        `.prop-cta[data-id="${p.id}"]`,
                    );
                    ctas.forEach((el) => (el.textContent = p.cta[currentLang]));

                    const statTexts = document.querySelectorAll(
                        `.prop-stat-text[data-id="${p.id}"]`,
                    );
                    statTexts.forEach((el) => {
                        const statIndex = Number(el.dataset.index);
                        if (Number.isInteger(statIndex) && p.stats[statIndex]) {
                            el.textContent =
                                p.stats[statIndex].text[currentLang];
                        }
                    });

                    const featureLabels = document.querySelectorAll(
                        `.prop-feature-label[data-id="${p.id}"]`,
                    );
                    featureLabels.forEach((el) => {
                        const featureIndex = Number(el.dataset.index);
                        if (
                            Number.isInteger(featureIndex) &&
                            p.features[featureIndex]
                        ) {
                            el.textContent =
                                p.features[featureIndex].label[currentLang];
                        }
                    });
                });
            }

            // Lightbox
            function openLightbox(src) {
                const lb = document.getElementById("lightbox");
                const img = document.getElementById("lightbox-img");
                img.src = src;
                lb.classList.remove("hidden");
                lb.classList.add("flex");
                document.body.style.overflow = "hidden";
            }

            function closeLightbox() {
                const lb = document.getElementById("lightbox");
                lb.classList.add("hidden");
                lb.classList.remove("flex");
                document.body.style.overflow = "auto";
            }

            // Reveal animations observer
            function observeElements() {
                const observerOptions = { threshold: 0.1 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("active");
                        }
                    });
                }, observerOptions);
                document
                    .querySelectorAll(".reveal")
                    .forEach((el) => observer.observe(el));
            }

            let cleanupHeaderNavigation = null;

            function setupHeaderNavigation() {
                if (typeof cleanupHeaderNavigation === "function") {
                    cleanupHeaderNavigation();
                }

                const nav = document.querySelector("nav");
                const navLinks = Array.from(
                    document.querySelectorAll("[data-header-link]"),
                );
                const sections = ["about", "ltt", "reviews"].map((id) => ({
                    id,
                    node: document.getElementById(id),
                }));
                let lockedActiveId = null;
                let lockedScrollTop = null;
                let unlockTimer = null;

                function getHeaderOffset() {
                    return nav ? nav.offsetHeight + 12 : 0;
                }

                function setActiveLink(activeId) {
                    navLinks.forEach((link) => {
                        const isActive =
                            link.getAttribute("href") === `#${activeId}`;
                        link.classList.toggle("is-active", isActive);
                        link.setAttribute(
                            "aria-current",
                            isActive ? "page" : "false",
                        );
                    });
                }

                function releaseActiveLock() {
                    lockedActiveId = null;
                    lockedScrollTop = null;
                    if (unlockTimer) {
                        window.clearTimeout(unlockTimer);
                        unlockTimer = null;
                    }
                }

                function lockActiveLink(activeId, scrollTop) {
                    lockedActiveId = activeId;
                    lockedScrollTop = scrollTop;
                    setActiveLink(activeId);

                    if (unlockTimer) {
                        window.clearTimeout(unlockTimer);
                    }

                    unlockTimer = window.setTimeout(() => {
                        releaseActiveLock();
                        updateActiveSection();
                    }, 700);
                }

                function updateActiveSection() {
                    if (!navLinks.length || !sections.length) return;

                    if (lockedActiveId !== null) {
                        if (Math.abs(window.scrollY - lockedScrollTop) <= 8) {
                            releaseActiveLock();
                        } else {
                            setActiveLink(lockedActiveId);
                            return;
                        }
                    }

                    const scrollPosition =
                        window.scrollY + getHeaderOffset() + 24;
                    let activeId = sections[0].id;

                    sections.forEach((section) => {
                        if (!section.node) return;
                        if (section.node.offsetTop <= scrollPosition) {
                            activeId = section.id;
                        }
                    });

                    setActiveLink(activeId);
                }

                function handleNavClick(event) {
                    const href = event.currentTarget.getAttribute("href");
                    if (!href || href.charAt(0) !== "#") return;

                    const target = document.querySelector(href);
                    if (!target) return;

                    event.preventDefault();
                    const top = Math.max(
                        target.offsetTop - getHeaderOffset(),
                        0,
                    );
                    lockActiveLink(href.slice(1), top);
                    window.scrollTo({ top, behavior: "smooth" });
                }

                navLinks.forEach((link) => {
                    link.addEventListener("click", handleNavClick);
                });

                window.addEventListener("scroll", updateActiveSection, {
                    passive: true,
                });
                window.addEventListener("resize", updateActiveSection);
                window.addEventListener("load", updateActiveSection);
                updateActiveSection();

                cleanupHeaderNavigation = function () {
                    navLinks.forEach((link) => {
                        link.removeEventListener("click", handleNavClick);
                    });
                    window.removeEventListener("scroll", updateActiveSection);
                    window.removeEventListener("resize", updateActiveSection);
                    window.removeEventListener("load", updateActiveSection);
                    if (unlockTimer) {
                        window.clearTimeout(unlockTimer);
                    }
                };
            }

            // Run Init
            init();
        </script>
    </body>
</html>
