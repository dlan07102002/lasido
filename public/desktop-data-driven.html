<!doctype html>

<html class="scroll-smooth" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>LaSiDoHouse | Boutique Stays in Hanoi</title>
        <script>
            (function () {
                var mobileQuery = window.matchMedia("(max-width: 767.98px)");

                function syncViewport(event) {
                    if (event.matches) {
                        window.location.replace("mobile-data-driven.html");
                    }
                }

                syncViewport(mobileQuery);

                if (typeof mobileQuery.addEventListener === "function") {
                    mobileQuery.addEventListener("change", syncViewport);
                } else {
                    mobileQuery.addListener(syncViewport);
                }
            })();
        </script>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script src="/shared-tailwind-config.js"></script>
        <script src="/desktop-tailwind-override.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link href="/shared-base.css" rel="stylesheet" />
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 300,
                    "GRAD" 0,
                    "opsz" 24;
                vertical-align: middle;
            }
            .reveal {
                opacity: 0;
                transform: translateY(30px);
                transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            }
            .reveal.active {
                opacity: 1;
                transform: translateY(0);
            }
            .hero-gradient {
                background: linear-gradient(
                    to bottom,
                    rgba(27, 29, 14, 0.4),
                    rgba(27, 29, 14, 0.1)
                );
            }
            .section-anchor-offset {
                scroll-margin-top: 0;
            }
            .header-nav-link {
                position: relative;
                display: inline-flex;
                padding-bottom: 0.35rem;
            }
            .header-nav-link::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 2px;
                background: #8b7355;
                transform: scaleX(0);
                transform-origin: center;
                transition: transform 250ms ease;
            }
            .header-nav-link.is-active {
                color: #8b7355 !important;
            }
            .header-nav-link.is-active::after {
                transform: scaleX(1);
            }
            .social-links {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }
            .social-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                width: 100%;
                min-height: 52px;
                padding: 0.75rem 1rem;
                border-radius: 9999px;
                border: 1px solid rgba(80, 101, 42, 0.14);
                background: rgba(255, 255, 255, 0.62);
                transition:
                    transform 180ms ease,
                    box-shadow 180ms ease,
                    background-color 180ms ease;
            }
            .social-link:hover {
                transform: translateY(-1px);
                box-shadow: 0 14px 28px rgba(27, 29, 14, 0.12);
                background: rgba(255, 255, 255, 0.9);
            }
            .social-logo {
                display: grid;
                place-items: center;
                width: 2.25rem;
                height: 2.25rem;
                border-radius: 9999px;
                flex: 0 0 auto;
                box-shadow: 0 10px 20px rgba(27, 29, 14, 0.16);
            }
            .social-logo svg {
                width: 1.1rem;
                height: 1.1rem;
                display: block;
            }
            .social-link-label {
                font-size: 0.95rem;
                font-weight: 600;
                line-height: 1;
                white-space: nowrap;
            }
            @media (min-width: 640px) {
                .social-links {
                    flex-direction: row;
                    flex-wrap: wrap;
                    width: auto;
                    justify-content: flex-end;
                }
                .social-link {
                    width: auto;
                    min-width: 168px;
                }
            }
        </style>
    </head>
    <body class="bg-surface text-on-surface font-body">
        <!-- TopNavBar -->
        <nav
            class="fixed top-0 w-full z-50 bg-[#faf5eb]/80 backdrop-blur-md flex justify-between items-center px-8 py-4 max-w-full mx-auto"
        >
            <div class="text-2xl font-['Noto_Serif'] italic text-primary">
                <a
                    class="text-2xl font-serif italic text-lime-950 dark:text-lime-200"
                    href="#"
                >
                    <img src="/assets/logo.svg" width="90"
                /></a>
            </div>
            <div
                class="hidden md:flex gap-8 font-['Noto_Serif'] font-normal tracking-tight"
                id="nav-links"
            >
                <!-- Dynamic Nav Links -->
            </div>
            <div class="flex items-center gap-4">
                <button
                    class="text-xs uppercase tracking-widest text-primary font-bold"
                    id="lang-btn"
                    onclick="toggleLang()"
                >
                    EN
                </button>
                <a
                    id="top-cta"
                    class="inline-flex items-center justify-center bg-gradient-to-r from-primary to-primary-container text-on-primary px-6 py-2 rounded-sm text-sm font-medium tracking-wide"
                    href="#booking"
                ></a>
            </div>
        </nav>
        <!-- Hero Section -->
        <section
            class="relative h-screen flex items-center justify-center overflow-hidden"
        >
            <div class="absolute inset-0 z-0">
                <img
                    alt=""
                    class="w-full h-full object-cover scale-105"
                    id="hero-image"
                    src="/assets/images/hero-section.jpg"
                />
                <div class="absolute inset-0 hero-gradient"></div>
            </div>
            <div class="relative z-10 text-center px-4 reveal active">
                <h1
                    class="font-headline text-7xl md:text-9xl text-white mb-6 tracking-tighter italic"
                >
                    LaSiDoHouse
                </h1>
                <p
                    class="text-surface-bright text-xl md:text-2xl font-light mb-12 tracking-wide max-w-2xl mx-auto"
                    id="hero-subtitle"
                ></p>
                <div
                    class="flex flex-col md:flex-row gap-4 justify-center items-center"
                    id="hero-ctas"
                >
                    <!-- Dynamic CTAs -->
                </div>
            </div>
        </section>
        <!-- About Section -->
        <section
            class="section-anchor-offset py-24 px-8 md:px-24 bg-surface grid md:grid-cols-2 gap-16 items-center"
            id="about"
        >
            <div class="space-y-8">
                <h2
                    class="font-headline text-4xl md:text-5xl text-on-surface leading-snug"
                >
                    <span id="about-title-leading"></span>
                    <span
                        class="italic font-normal"
                        id="about-title-accent"
                    ></span
                    >.
                </h2>
                <p
                    class="text-on-surface-variant leading-relaxed text-lg max-w-lg"
                    id="about-copy"
                ></p>
                <div class="grid grid-cols-2 gap-8 pt-4">
                    <div class="border-l border-outline-variant/30 pl-6">
                        <span class="block text-4xl font-headline text-primary"
                            >3
                            <span class="text-2xl" id="about-floors-unit"></span
                        ></span>
                        <span
                            class="text-sm uppercase tracking-widest text-on-surface-variant font-medium"
                            id="about-floors-label"
                        ></span>
                    </div>
                    <div class="border-l border-outline-variant/30 pl-6">
                        <span class="block text-4xl font-headline text-primary"
                            >4.8 ★</span
                        >
                        <span
                            class="text-sm uppercase tracking-widest text-on-surface-variant font-medium"
                            id="about-rating-label"
                        ></span>
                    </div>
                    <div class="border-l border-outline-variant/30 pl-6">
                        <span
                            class="block text-4xl font-headline text-primary"
                            id="about-host-value"
                        ></span>
                        <span
                            class="text-sm uppercase tracking-widest text-on-surface-variant font-medium"
                            id="about-host-label"
                        ></span>
                    </div>
                </div>
            </div>
            <div class="relative">
                <div
                    class="aspect-[4/5] bg-surface-container-high rounded-sm overflow-hidden"
                >
                    <img
                        alt=""
                        class="w-full h-full object-cover"
                        id="about-image"
                        src="/assets/images/le-thanh-tong/ltt-6.avif"
                    />
                </div>
                <div
                    class="absolute -bottom-8 -left-8 bg-primary p-8 text-on-primary max-w-xs shadow-2xl"
                >
                    <p
                        class="font-headline text-xl italic"
                        id="about-highlight"
                    ></p>
                </div>
            </div>
        </section>
        <!-- Main Container for Properties -->
        <main id="properties-container">
            <!-- Dynamic Property Sections -->
        </main>
        <!-- Quote Divider -->
        <section
            class="py-32 bg-surface-container-low text-center overflow-hidden"
        >
            <div class="reveal">
                <span
                    class="material-symbols-outlined text-primary/30 text-6xl mb-6"
                    >format_quote</span
                >
                <h2
                    class="font-headline text-4xl md:text-6xl italic text-on-surface-variant max-w-4xl mx-auto leading-tight px-6"
                    id="quote-text"
                ></h2>
                <div class="mt-8 h-[1px] w-24 bg-primary/20 mx-auto"></div>
            </div>
        </section>
        <!-- Social Proof -->
        <section
            class="section-anchor-offset py-24 bg-surface-container"
            id="reviews"
        >
            <div class="max-w-7xl mx-auto px-8">
                <div class="flex justify-between items-end mb-16 reveal">
                    <div>
                        <h3
                            class="font-headline text-4xl mb-2"
                            id="reviews-title"
                        ></h3>
                        <p
                            class="text-on-surface-variant"
                            id="reviews-subtitle"
                        ></p>
                    </div>
                    <a
                        class="text-primary font-bold tracking-widest uppercase text-sm border-b border-primary/20 pb-1"
                        href="#booking"
                        id="reviews-link"
                    ></a>
                </div>
                <div
                    class="grid grid-cols-1 md:grid-cols-3 gap-8"
                    id="reviews-container"
                >
                    <!-- Dynamic reviews -->
                </div>
            </div>
        </section>
        <section
            class="section-anchor-offset py-24 bg-gradient-to-br from-primary to-primary-container text-white"
            id="booking"
        >
            <div class="max-w-6xl mx-auto px-8">
                <div class="grid items-start gap-12 lg:grid-cols-[1.1fr_0.9fr]">
                    <div class="reveal">
                        <p
                            class="text-[11px] uppercase tracking-[0.32em] text-white/70"
                            id="booking-kicker"
                        ></p>
                        <h3
                            class="mt-3 max-w-xl font-headline text-4xl italic leading-tight lg:text-5xl"
                            id="booking-title"
                        ></h3>
                        <p
                            class="mt-4 max-w-2xl text-lg leading-relaxed text-white/82"
                            id="booking-copy"
                        ></p>
                    </div>
                    <div class="space-y-4 reveal" id="booking-links"></div>
                </div>
            </div>
        </section>
        <!-- Footer -->
        <footer class="bg-stone-100 dark:bg-stone-950 w-full py-12 px-8">
            <div
                class="flex flex-col md:flex-row justify-between items-center gap-6 max-w-7xl mx-auto"
            >
                <div class="flex flex-col items-center md:items-start gap-4">
                    <a
                        class="text-xl font-serif text-lime-950 dark:text-lime-100"
                        href="#"
                    >
                        <img src="/assets/logo.svg" width="90" />
                    </a>
                    <p
                        class="font-sans text-sm uppercase tracking-widest text-lime-900 dark:text-lime-400"
                    >
                        Hoan Kiem, Hanoi
                    </p>
                </div>
                <div class="flex gap-8">
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"
                        href="#"
                        id="footer-privacy"
                    ></a>
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"
                        href="#"
                        id="footer-rules"
                    ></a>
                    <a
                        class="text-stone-500 dark:text-stone-500 hover:text-lime-800 dark:hover:text-lime-200 transition-all font-sans text-sm uppercase tracking-widest"
                        href="#"
                        id="footer-contact"
                    ></a>
                </div>
                <div
                    class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto"
                >
                    <p
                        class="font-sans text-[11px] uppercase tracking-[0.3em] text-stone-500 dark:text-stone-500 w-full text-center"
                        id="footer-follow"
                    ></p>
                    <div class="social-links">
                        <a
                            class="social-link text-lime-950 dark:text-lime-100"
                            href="https://www.facebook.com/profile.php?id=61584634003772"
                            rel="noopener noreferrer"
                            target="_blank"
                        >
                            <span
                                class="social-logo social-logo-facebook"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M13.642 23V13.876H16.703L17.162 10.32H13.642V8.049C13.642 7.02 13.927 6.318 15.403 6.318H17.286V3.138C16.96 3.095 15.84 3 14.538 3C11.82 3 9.958 4.659 9.958 7.705V10.32H7V13.876H9.958V23H13.642Z"
                                        fill="white"
                                    />
                                </svg>
                            </span>
                            <span class="social-link-label">Facebook</span>
                        </a>
                        <a
                            class="social-link text-lime-950 dark:text-lime-100"
                            href="https://www.instagram.com/lasidohomestay/"
                            rel="noopener noreferrer"
                            target="_blank"
                        >
                            <span
                                class="social-logo social-logo-instagram"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M7.75 2H16.25C19.4256 2 22 4.57436 22 7.75V16.25C22 19.4256 19.4256 22 16.25 22H7.75C4.57436 22 2 19.4256 2 16.25V7.75C2 4.57436 4.57436 2 7.75 2ZM16.25 3.8H7.75C5.56848 3.8 3.8 5.56848 3.8 7.75V16.25C3.8 18.4315 5.56848 20.2 7.75 20.2H16.25C18.4315 20.2 20.2 18.4315 20.2 16.25V7.75C20.2 5.56848 18.4315 3.8 16.25 3.8ZM12 6.75C14.8995 6.75 17.25 9.10051 17.25 12C17.25 14.8995 14.8995 17.25 12 17.25C9.10051 17.25 6.75 14.8995 6.75 12C6.75 9.10051 9.10051 6.75 12 6.75ZM12 8.55C10.0946 8.55 8.55 10.0946 8.55 12C8.55 13.9054 10.0946 15.45 12 15.45C13.9054 15.45 15.45 13.9054 15.45 12C15.45 10.0946 13.9054 8.55 12 8.55ZM17.575 5.4C18.0507 5.4 18.4364 5.78566 18.4364 6.26136C18.4364 6.73705 18.0507 7.12273 17.575 7.12273C17.0993 7.12273 16.7136 6.73705 16.7136 6.26136C16.7136 5.78566 17.0993 5.4 17.575 5.4Z"
                                        fill="white"
                                    />
                                </svg>
                            </span>
                            <span class="social-link-label">Instagram</span>
                        </a>
                    </div>
                </div>
            </div>
            <div
                class="mt-12 text-center text-stone-500 dark:text-stone-500 font-sans text-xs uppercase tracking-widest"
                id="footer-copy"
            ></div>
        </footer>
        <!-- Lightbox -->
        <div
            class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-8 backdrop-blur-xl transition-all duration-500"
            id="lightbox"
            onclick="closeLightbox()"
        >
            <button
                class="absolute top-8 right-8 text-white text-4xl"
                id="lightbox-close"
                type="button"
            >
                <span class="material-symbols-outlined">close</span>
            </button>
            <img
                class="max-w-full max-h-[90vh] object-contain rounded-sm shadow-2xl"
                id="lightbox-img"
                src=""
            />
        </div>
        <script src="/content-config.js"></script>
        <script src="/shared-runtime.js"></script>
        <script src="/desktop-page.js"></script>
    </body>
</html>
