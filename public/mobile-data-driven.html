<!doctype html>

<html class="scroll-smooth" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>LaSiDoHouse | Boutique Stays in Hanoi</title>
        <script>
            (function () {
                var desktopQuery = window.matchMedia("(min-width: 768px)");

                function syncViewport(event) {
                    if (event.matches) {
                        window.location.replace("desktop-data-driven.html");
                    }
                }

                syncViewport(desktopQuery);

                if (typeof desktopQuery.addEventListener === "function") {
                    desktopQuery.addEventListener("change", syncViewport);
                } else {
                    desktopQuery.addListener(syncViewport);
                }
            })();
        </script>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script src="/shared-tailwind-config.js"></script>
        <script src="/mobile-tailwind-override.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link href="/shared-base.css" rel="stylesheet" />
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 350,
                    "GRAD" 0,
                    "opsz" 24;
                vertical-align: middle;
            }

            .hero-gradient {
                background: linear-gradient(
                    to bottom,
                    rgba(27, 29, 14, 0.28),
                    rgba(27, 29, 14, 0.7)
                );
            }

            .hide-scrollbar::-webkit-scrollbar {
                display: none;
            }

            .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            .social-card-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .social-card-link {
                display: flex;
                align-items: center;
                gap: 0.875rem;
                min-height: 72px;
                padding: 0.95rem 1rem;
                border-radius: 1rem;
                border: 1px solid rgba(127, 117, 107, 0.2);
                background: rgba(255, 255, 255, 0.72);
                box-shadow: 0 12px 24px rgba(77, 69, 60, 0.08);
            }

            .social-card-logo {
                display: grid;
                place-items: center;
                width: 2.75rem;
                height: 2.75rem;
                border-radius: 9999px;
                flex: 0 0 auto;
                box-shadow: 0 12px 22px rgba(27, 29, 14, 0.16);
            }

            .social-card-logo svg {
                width: 1.35rem;
                height: 1.35rem;
                display: block;
            }

            .social-card-copy {
                min-width: 0;
            }

            .social-card-title {
                font-size: 0.95rem;
                font-weight: 700;
                line-height: 1.15;
            }

            .social-card-subtitle {
                margin-top: 0.2rem;
                font-size: 0.72rem;
                line-height: 1.3;
            }

            @media (min-width: 420px) {
                .social-card-grid {
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                }
            }

            .bottom-nav-link {
                color: #8b7355;
                opacity: 0.72;
                transition:
                    color 180ms ease,
                    opacity 180ms ease,
                    transform 180ms ease;
            }

            .bottom-nav-link-active {
                color: #8b7355;
                opacity: 1;
                transform: translateY(-1px);
            }

            .bottom-nav-link-active .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 1,
                    "wght" 350,
                    "GRAD" 0,
                    "opsz" 24;
            }

            #properties-container,
            #reviews,
            #booking {
                scroll-margin-top: 88px;
            }
        </style>
    </head>
    <body class="bg-surface text-on-surface font-body">
        <header
            class="fixed top-0 left-0 right-0 z-50 bg-[#faf5eb]/85 backdrop-blur-md border-b border-primary/10"
        >
            <div class="flex items-center justify-between px-4 py-3">
                <div>
                    <div class="font-headline text-lg italic text-primary">
                        <a
                            class="text-2xl font-serif italic text-lime-950 dark:text-lime-200"
                            href="#"
                        >
                            <img src="/assets/logo.svg" width="90"
                        /></a>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        class="h-9 min-w-9 px-3 rounded-full border border-primary/15 text-[11px] font-bold uppercase tracking-[0.2em] text-primary"
                        id="lang-btn"
                        type="button"
                    >
                        EN
                    </button>
                    <a
                        class="h-9 px-4 inline-flex items-center rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary text-[11px] font-semibold uppercase tracking-[0.14em]"
                        href="#booking"
                    >
                        <span id="top-cta"></span>
                    </a>
                </div>
            </div>
        </header>

        <main class="pb-28">
            <section class="relative min-h-[620px] flex items-end pt-16">
                <div class="absolute inset-0">
                    <img
                        alt=""
                        class="h-full w-full object-cover"
                        id="hero-image"
                        src="/assets/images/hero-section.jpg"
                    />

                    <div class="absolute inset-0 hero-gradient"></div>
                </div>
                <div class="relative z-10 px-4 pb-10 pt-12 text-white">
                    <p
                        class="mb-3 text-[11px] uppercase tracking-[0.35em] text-white/75"
                        id="hero-kicker"
                    ></p>
                    <h1
                        class="font-headline text-5xl italic leading-none tracking-tight"
                    >
                        LaSiDoHouse
                    </h1>
                    <p
                        class="mt-4 max-w-sm text-sm leading-6 text-surface-bright/90"
                        id="hero-subtitle"
                    ></p>
                    <div
                        class="mt-6 flex gap-3 overflow-x-auto pb-2 hide-scrollbar"
                        id="hero-ctas"
                    ></div>
                </div>
            </section>

            <section class="px-6 py-12 bg-surface-container-low" id="about">
                <div class="grid grid-cols-3 gap-4 mb-12">
                    <div class="bg-surface p-4 text-center">
                        <p class="font-headline text-2xl text-primary">3</p>
                        <p
                            class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold"
                            id="about-floors-unit"
                        ></p>
                    </div>

                    <div class="bg-surface p-4 text-center">
                        <p class="font-headline text-2xl text-primary">4.8 ★</p>
                        <p
                            class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold"
                            id="about-rating-label"
                        ></p>
                    </div>

                    <div class="bg-surface p-4 text-center">
                        <p
                            class="font-headline text-2xl text-primary"
                            id="about-host-value"
                        ></p>
                        <p
                            class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold"
                            id="about-host-label"
                        ></p>
                    </div>
                </div>
                <div class="space-y-6">
                    <h3
                        class="font-headline text-3xl tracking-tight leading-snug"
                        id="about-title"
                    ></h3>
                    <p
                        class="text-on-surface-variant leading-relaxed text-lg"
                        id="about-copy"
                    ></p>
                </div>
            </section>

            <section
                class="mt-8 px-4 space-y-8"
                id="properties-container"
            ></section>

            <section class="mt-10 px-4">
                <div
                    class="rounded-[2rem] bg-surface-container-low px-6 py-10 text-center"
                >
                    <span
                        class="material-symbols-outlined text-5xl text-primary/25"
                        >format_quote</span
                    >
                    <h2
                        class="mt-4 font-headline text-3xl italic leading-tight text-on-surface-variant"
                        id="quote-text"
                    ></h2>
                </div>
            </section>

            <section class="mt-10 px-4" id="reviews">
                <div class="flex items-end justify-between gap-4">
                    <div>
                        <p
                            class="text-[11px] uppercase tracking-[0.24em] text-primary/70"
                            id="reviews-kicker"
                        ></p>
                        <h3
                            class="mt-2 font-headline text-2xl"
                            id="reviews-title"
                        ></h3>
                    </div>
                    <a
                        class="text-[11px] font-semibold uppercase tracking-[0.18em] text-primary"
                        href="#booking"
                        id="reviews-link"
                    ></a>
                </div>
                <p
                    class="mt-2 text-sm leading-6 text-on-surface-variant"
                    id="reviews-subtitle"
                ></p>
                <div class="mt-6 space-y-4" id="reviews-container"></div>
            </section>

            <section class="mt-10 px-4" id="booking">
                <div
                    class="rounded-[2rem] bg-gradient-to-br from-primary to-primary-container px-6 py-8 text-white"
                >
                    <p
                        class="text-[11px] uppercase tracking-[0.24em] text-white/70"
                        id="booking-kicker"
                    ></p>
                    <h4
                        class="mt-2 font-headline text-3xl italic leading-tight"
                        id="booking-title"
                    ></h4>
                    <p
                        class="mt-3 text-sm leading-6 text-white/85"
                        id="booking-copy"
                    ></p>
                    <div class="mt-5 space-y-3" id="booking-links"></div>
                </div>
            </section>

            <footer class="mt-12 border-t border-primary/10 px-4 pb-32 pt-8">
                <div
                    class="rounded-3xl bg-surface-container px-5 py-5 shadow-sm"
                >
                    <p
                        class="text-[10px] font-bold uppercase tracking-[0.3em] text-secondary mb-4"
                        id="footer-follow"
                    ></p>
                    <div class="social-card-grid">
                        <a
                            class="social-card-link"
                            href="https://www.facebook.com/profile.php?id=61584634003772"
                            rel="noopener noreferrer"
                            target="_blank"
                        >
                            <span
                                class="social-card-logo social-card-logo-facebook"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M13.642 23V13.876H16.703L17.162 10.32H13.642V8.049C13.642 7.02 13.927 6.318 15.403 6.318H17.286V3.138C16.96 3.095 15.84 3 14.538 3C11.82 3 9.958 4.659 9.958 7.705V10.32H7V13.876H9.958V23H13.642Z"
                                        fill="white"
                                    />
                                </svg>
                            </span>
                            <div class="social-card-copy">
                                <p class="social-card-title text-on-surface">
                                    Facebook
                                </p>
                                <p
                                    class="social-card-subtitle text-on-surface-variant"
                                    id="social-facebook-subtitle"
                                ></p>
                            </div>
                        </a>
                        <a
                            class="social-card-link"
                            href="https://www.instagram.com/lasidohomestay/"
                            rel="noopener noreferrer"
                            target="_blank"
                        >
                            <span
                                class="social-card-logo social-card-logo-instagram"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M7.75 2H16.25C19.4256 2 22 4.57436 22 7.75V16.25C22 19.4256 19.4256 22 16.25 22H7.75C4.57436 22 2 19.4256 2 16.25V7.75C2 4.57436 4.57436 2 7.75 2ZM16.25 3.8H7.75C5.56848 3.8 3.8 5.56848 3.8 7.75V16.25C3.8 18.4315 5.56848 20.2 7.75 20.2H16.25C18.4315 20.2 20.2 18.4315 20.2 16.25V7.75C20.2 5.56848 18.4315 3.8 16.25 3.8ZM12 6.75C14.8995 6.75 17.25 9.10051 17.25 12C17.25 14.8995 14.8995 17.25 12 17.25C9.10051 17.25 6.75 14.8995 6.75 12C6.75 9.10051 9.10051 6.75 12 6.75ZM12 8.55C10.0946 8.55 8.55 10.0946 8.55 12C8.55 13.9054 10.0946 15.45 12 15.45C13.9054 15.45 15.45 13.9054 15.45 12C15.45 10.0946 13.9054 8.55 12 8.55ZM17.575 5.4C18.0507 5.4 18.4364 5.78566 18.4364 6.26136C18.4364 6.73705 18.0507 7.12273 17.575 7.12273C17.0993 7.12273 16.7136 6.73705 16.7136 6.26136C16.7136 5.78566 17.0993 5.4 17.575 5.4Z"
                                        fill="white"
                                    />
                                </svg>
                            </span>
                            <div class="social-card-copy">
                                <p class="social-card-title text-on-surface">
                                    Instagram
                                </p>
                                <p
                                    class="social-card-subtitle text-on-surface-variant"
                                    id="social-instagram-subtitle"
                                ></p>
                            </div>
                        </a>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <a class="inline-flex items-center justify-center" href="#">
                        <img src="/assets/logo.svg" width="90" />
                    </a>
                    <p
                        class="mt-3 text-[11px] uppercase tracking-[0.24em] text-on-surface-variant"
                        id="footer-copy"
                    ></p>
                </div>
                <div
                    class="mt-6 flex items-center justify-center gap-6 text-sm uppercase tracking-[0.18em] text-on-surface-variant"
                >
                    <a href="#" id="footer-privacy"></a>
                    <a href="#" id="footer-terms"></a>
                    <a href="#" id="footer-contact"></a>
                </div>
            </footer>
        </main>

        <nav
            class="fixed bottom-0 left-0 right-0 z-50 border-t border-primary/10 bg-[#fbfbe2]/92 px-4 pb-6 pt-3 backdrop-blur-md"
        >
            <div class="grid grid-cols-3 gap-3 text-center">
                <a
                    class="bottom-nav-link bottom-nav-link-active flex flex-col items-center gap-1"
                    data-nav-link=""
                    href="#properties-container"
                >
                    <span class="material-symbols-outlined">bed</span>
                    <span
                        class="text-[11px] uppercase tracking-[0.18em]"
                        id="nav-stays"
                    ></span>
                </a>
                <a
                    class="bottom-nav-link flex flex-col items-center gap-1"
                    data-nav-link=""
                    href="#reviews"
                >
                    <span class="material-symbols-outlined">star</span>
                    <span
                        class="text-[11px] uppercase tracking-[0.18em]"
                        id="nav-reviews"
                    ></span>
                </a>
                <a
                    class="bottom-nav-link flex flex-col items-center gap-1"
                    data-nav-link=""
                    href="#booking"
                >
                    <span class="material-symbols-outlined"
                        >calendar_month</span
                    >
                    <span
                        class="text-[11px] uppercase tracking-[0.18em]"
                        id="nav-booking"
                    ></span>
                </a>
            </div>
        </nav>

        <div
            class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90 p-4"
            id="lightbox"
        >
            <button
                class="absolute right-4 top-4 text-white"
                id="lightbox-close"
                type="button"
            >
                <span class="material-symbols-outlined text-3xl">close</span>
            </button>
            <img
                alt=""
                class="max-h-[88vh] max-w-full rounded-xl object-contain"
                id="lightbox-img"
                src=""
            />
        </div>

        <script src="/content-config.js"></script>
        <script src="/shared-runtime.js"></script>
        <script src="/mobile-page.js"></script>
    </body>
</html>
