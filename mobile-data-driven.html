                            .map(
                                (feature) => `
                            <div class="rounded-2xl bg-surface-container-low px-3 py-4 text-center">
                                <span class="material-symbols-outlined" style="color: ${property.accent}">${feature.icon}</span>
                                <p class="mt-2 text-[10px] font-bold uppercase tracking-[0.16em] text-on-surface">${feature.label[currentLang]}</p>
                            </div>
                        `,
                            )
                            .join("")}
                    </div>
                    <a class="mt-5 flex w-full items-center justify-center gap-2 rounded-full px-5 py-4 text-[11px] font-semibold uppercase tracking-[0.16em] text-white" href="${property.ctaHref}" style="background: linear-gradient(135deg, ${property.accent}, ${property.accent}dd)">
                        <span>${property.cta[currentLang]}</span>
                        <span class="material-symbols-outlined !text-base">arrow_forward</span>
                    </a>
                </div>
            </article>
        `,
                ).join("");
            }

            function renderReviews() {
                const container = document.getElementById("reviews-container");
                container.innerHTML = REVIEWS.map(
                    (review, index) => `
            <article class="rounded-[2rem] border border-primary/10 bg-white px-5 py-5 shadow-sm">
                <div class="flex items-center gap-1 text-primary">
                    ${Array.from({ length: 5 }, () => '<span class="material-symbols-outlined !text-base" style="font-variation-settings: \'FILL\' 1;">star</span>').join("")}
                </div>
                <p class="mt-4 font-headline text-lg italic leading-7 text-on-surface-variant">${review.text[currentLang]}</p>
                <div class="mt-5 flex items-center gap-3">
                    <div class="flex h-11 w-11 items-center justify-center rounded-full ${index % 2 === 0 ? "bg-surface-container" : "bg-surface-container-high"} font-semibold text-primary">
                        ${review.name
                            .split(" ")
                            .map((part) => part[0])
                            .join("")
                            .slice(0, 2)}
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-on-surface">${review.name}</p>
                        <p class="text-[11px] uppercase tracking-[0.18em] text-on-surface-variant">${review.place[currentLang]}</p>
                    </div>
                </div>
            </article>
        `,
                ).join("");
            }

            function renderBookingLinks() {
                const container = document.getElementById("booking-links");
                container.innerHTML = PROPERTIES.map(
                    (property) => `
            <a class="flex items-center justify-between rounded-2xl bg-white/12 px-4 py-4 backdrop-blur-sm" href="${property.ctaHref}">
                <div>
                    <p class="text-[11px] uppercase tracking-[0.22em] text-white/60">${property.label[currentLang]}</p>
                    <p class="mt-1 font-headline text-xl">${property.title[currentLang]}</p>
                </div>
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
        `,
                ).join("");
            }

            function renderStaticCopy() {
                const copy = COPY[currentLang];
                document.getElementById("lang-btn").textContent =
                    currentLang.toUpperCase();
                document.getElementById("top-cta").textContent = copy.topCta;
                document.getElementById("hero-kicker").textContent =
                    copy.heroKicker;
                document.getElementById("hero-subtitle").textContent =
                    copy.heroSubtitle;
                document.getElementById("hero-ctas").innerHTML =
                    renderHeroCtas();
                document.getElementById("intro-kicker").textContent =
                    copy.introKicker;
                document.getElementById("intro-title").textContent =
                    copy.introTitle;
                document.getElementById("intro-copy").textContent =
                    copy.introCopy;
                document.getElementById("quote-text").textContent = copy.quote;
                document.getElementById("reviews-kicker").textContent =
                    copy.reviewsKicker;
                document.getElementById("reviews-title").textContent =
                    copy.reviewsTitle;
                document.getElementById("reviews-subtitle").textContent =
                    copy.reviewsSubtitle;
                document.getElementById("reviews-link").textContent =
                    copy.reviewsLink;
                document.getElementById("booking-kicker").textContent =
                    copy.bookingKicker;
                document.getElementById("booking-title").textContent =
                    copy.bookingTitle;
                document.getElementById("booking-copy").textContent =
                    copy.bookingCopy;
                document.getElementById("footer-copy").textContent =
                    copy.footerCopy;
                document.getElementById("nav-stays").textContent =
                    copy.navStays;
                document.getElementById("nav-reviews").textContent =
                    copy.navReviews;
                document.getElementById("nav-booking").textContent =
                    copy.navBooking;
            }

            function renderPage() {
                renderStaticCopy();
                renderProperties();
                renderReviews();
                renderBookingLinks();
            }

            function openLightbox(src) {
                const lightbox = document.getElementById("lightbox");
                document.getElementById("lightbox-img").src = src;
                lightbox.classList.remove("hidden");
                lightbox.classList.add("flex");
                document.body.style.overflow = "hidden";
            }

            function closeLightbox() {
                const lightbox = document.getElementById("lightbox");
                lightbox.classList.add("hidden");
                lightbox.classList.remove("flex");
                document.body.style.overflow = "";
            }

            document
                .getElementById("lang-btn")
                .addEventListener("click", () => {
                    setLanguage(currentLang === "en" ? "vi" : "en");
                });

            document
                .getElementById("lightbox")
                .addEventListener("click", closeLightbox);
            document
                .getElementById("lightbox-close")
                .addEventListener("click", (event) => {
                    event.stopPropagation();
                    closeLightbox();
                });

            (function initBottomNav() {
                const navLinks = Array.from(
                    document.querySelectorAll("[data-nav-link]"),
                );
                const sections = [
                    {
                        id: "properties-container",
                        node: document.getElementById("properties-container"),
                    },
                    { id: "reviews", node: document.getElementById("reviews") },
                    { id: "booking", node: document.getElementById("booking") },
                ];
                const headerOffset = 88;
                let lockedActiveId = null;
                let lockedScrollTop = null;
                let unlockTimer = null;

                function setActiveLink(activeId) {
                    navLinks.forEach((link) => {
                        const isActive =
                            link.getAttribute("href") === `#${activeId}`;
                        link.classList.toggle(
                            "bottom-nav-link-active",
                            isActive,
                        );
                        link.setAttribute(
                            "aria-current",
                            isActive ? "page" : "false",
                        );
                    });
                }

                function releaseActiveLock() {
                    lockedActiveId = null;
                    lockedScrollTop = null;
                    if (unlockTimer) {
                        window.clearTimeout(unlockTimer);
                        unlockTimer = null;
                    }
                }

                function lockActiveLink(activeId, scrollTop) {
                    lockedActiveId = activeId;
                    lockedScrollTop = scrollTop;
                    setActiveLink(activeId);

                    if (unlockTimer) {
                        window.clearTimeout(unlockTimer);
                    }

                    unlockTimer = window.setTimeout(() => {
                        releaseActiveLock();
                        updateActiveSection();
                    }, 700);
                }

                function updateActiveSection() {
                    if (lockedActiveId !== null) {
                        if (Math.abs(window.scrollY - lockedScrollTop) <= 8) {
                            releaseActiveLock();
                        } else {
                            setActiveLink(lockedActiveId);
                            return;
                        }
                    }

                    const scrollPosition = window.scrollY + headerOffset + 24;
                    let activeId = "properties-container";

                    sections.forEach((section) => {
                        if (
                            section.node &&
                            section.node.offsetTop <= scrollPosition
                        ) {
                            activeId = section.id;
                        }
                    });

                    setActiveLink(activeId);
                }

                navLinks.forEach((link) => {
                    link.addEventListener("click", (event) => {
                        const targetSelector = link.getAttribute("href");
                        const target = targetSelector
                            ? document.querySelector(targetSelector)
                            : null;

                        if (!target) {
                            return;
                        }

                        event.preventDefault();
                        const top = Math.max(
                            target.offsetTop - headerOffset,
                            0,
                        );
                        lockActiveLink(target.id, top);
                        window.scrollTo({ top, behavior: "smooth" });
                    });
                });

                window.addEventListener("scroll", updateActiveSection, {
                    passive: true,
                });
                window.addEventListener("load", updateActiveSection);
                updateActiveSection();
            })();

            renderPage();
        </script>
    </body>
</html>
